<!DOCTYPE html>
<html lang="en">
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,500,0,0" />
  <style>
    /* ─────────────────────────────────────────
       TOKENS
    ───────────────────────────────────────── */
    :root {
      --ink:        #0D1117;
      --ink-2:      #24292F;
      --muted:      #57606A;
      --faint:      #8C959F;
      --border:     #D0D7DE;
      --surface:    #FFFFFF;
      --bg:         #F6F8FA;
      --blue:       #0969DA;
      --blue-lt:    #DDF4FF;
      --blue-dk:    #0550AE;
      --green:      #1A7F37;
      --green-lt:   #DAFBE1;
      --yellow:     #9A6700;
      --yellow-lt:  #FFF8C5;
      --red:        #CF222E;
      --red-lt:     #FFEBE9;
      --purple:     #8250DF;
      --purple-lt:  #FBEFFF;
      --shadow-sm:  0 1px 0 rgba(27,31,36,.04),0 1px 3px rgba(27,31,36,.08);
      --shadow-md:  0 3px 6px rgba(27,31,36,.1),0 8px 24px rgba(66,74,83,.1);
      --radius:     8px;
      --radius-lg:  12px;
    }

    /* ─────────────────────────────────────────
       RESET
    ───────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-font-smoothing: antialiased; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
    }
    .material-symbols-outlined { font-size: 16px; vertical-align: -3px; }

    /* ─────────────────────────────────────────
       PAGE CHROME
    ───────────────────────────────────────── */
    .page-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: var(--shadow-sm);
    }
    .ph-left {
      display: flex; align-items: center; gap: 16px;
    }
    .ph-logo {
      display: flex; align-items: center; gap: 10px;
      text-decoration: none;
    }
    .ph-logo img { width: 24px; height: 24px; object-fit: contain; }
    .ph-logo-name {
      font-size: 15px; font-weight: 600; color: var(--ink);
      letter-spacing: -.3px;
    }
    .ph-divider {
      width: 1px; height: 20px; background: var(--border);
    }
    .ph-title {
      font-size: 15px; font-weight: 500; color: var(--muted);
    }
    .ph-right {
      display: flex; align-items: center; gap: 10px;
    }
    .btn-sm {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 14px; border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif; font-size: 13px;
      font-weight: 500; cursor: pointer; transition: .15s;
      text-decoration: none; border: 1px solid var(--border);
      background: var(--surface); color: var(--ink-2);
    }
    .btn-sm:hover { background: var(--bg); border-color: var(--muted); }
    .btn-sm.primary {
      background: var(--blue); border-color: var(--blue);
      color: #fff;
    }
    .btn-sm.primary:hover { background: var(--blue-dk); border-color: var(--blue-dk); }
    .live-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--green); flex-shrink: 0;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(26,127,55,.4); }
      50% { box-shadow: 0 0 0 5px rgba(26,127,55,0); }
    }
    .live-label {
      font-family: 'DM Mono', monospace;
      font-size: 11px; color: var(--green); font-weight: 500;
    }

    /* ─────────────────────────────────────────
       MAIN LAYOUT
    ───────────────────────────────────────── */
    .page-body {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 32px 80px;
    }

    /* ─────────────────────────────────────────
       HERO STRIP
    ───────────────────────────────────────── */
    .hero {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 28px 32px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      box-shadow: var(--shadow-sm);
      animation: fadeUp .4s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: none; }
    }
    .hero-left { display: flex; flex-direction: column; gap: 6px; }
    .hero-date {
      font-family: 'DM Mono', monospace;
      font-size: 12px; color: var(--faint); letter-spacing: .5px;
      text-transform: uppercase;
    }
    .hero-heading {
      font-size: 26px; font-weight: 700; color: var(--ink);
      letter-spacing: -.5px; line-height: 1.2;
    }
    .hero-sub {
      font-size: 14px; color: var(--muted); margin-top: 2px;
    }
    .hero-stats {
      display: flex; gap: 16px; flex-wrap: wrap;
    }
    .hero-stat {
      display: flex; flex-direction: column; align-items: center;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px 22px;
      min-width: 90px;
    }
    .hero-stat-val {
      font-size: 28px; font-weight: 700; color: var(--ink);
      line-height: 1; font-family: 'DM Mono', monospace;
    }
    .hero-stat-val.c-green  { color: var(--green); }
    .hero-stat-val.c-yellow { color: var(--yellow); }
    .hero-stat-val.c-red    { color: var(--red); }
    .hero-stat-lbl {
      font-size: 11px; color: var(--faint); margin-top: 4px;
      text-transform: uppercase; letter-spacing: .5px; font-weight: 500;
    }

    /* ─────────────────────────────────────────
       DAY TABS
    ───────────────────────────────────────── */
    .day-tabs {
      display: flex; gap: 0; margin-bottom: 20px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 4px;
      width: fit-content;
      animation: fadeUp .4s .1s ease both;
    }
    .day-tab {
      padding: 8px 24px; border-radius: 8px;
      font-size: 14px; font-weight: 500; color: var(--muted);
      cursor: pointer; transition: .2s; display: flex;
      align-items: center; gap: 8px; user-select: none;
    }
    .day-tab:hover { color: var(--ink); background: var(--bg); }
    .day-tab.active {
      background: var(--ink); color: #fff;
      box-shadow: var(--shadow-sm);
    }
    .day-tab-date {
      font-family: 'DM Mono', monospace;
      font-size: 11px; opacity: .6;
    }
    .day-tab-count {
      font-size: 11px; font-weight: 700; padding: 1px 7px;
      border-radius: 99px;
    }
    .day-tab.active .day-tab-count { background: rgba(255,255,255,.2); color: #fff; }
    .day-tab:not(.active) .day-tab-count { background: var(--bg); color: var(--muted); border: 1px solid var(--border); }

    /* ─────────────────────────────────────────
       SCHEDULE TABLE
    ───────────────────────────────────────── */
    .schedule-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      animation: fadeUp .4s .15s ease both;
    }

    /* Section header (Supervisors / SMEs) */
    .section-header {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 24px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }
    .section-header-label {
      font-family: 'DM Mono', monospace;
      font-size: 11px; font-weight: 500;
      text-transform: uppercase; letter-spacing: 1px;
      color: var(--muted);
    }
    .section-header-line { flex: 1; height: 1px; background: var(--border); }
    .section-header-count {
      font-family: 'DM Mono', monospace;
      font-size: 11px; color: var(--faint);
    }

    /* Person rows */
    .person-row {
      display: flex; align-items: center;
      padding: 14px 24px; gap: 16px;
      border-bottom: 1px solid var(--border);
      transition: background .12s;
      animation: rowIn .3s ease both;
    }
    .person-row:last-child { border-bottom: none; }
    .person-row:hover { background: var(--bg); }

    @keyframes rowIn {
      from { opacity: 0; transform: translateX(-6px); }
      to   { opacity: 1; transform: none; }
    }

    .person-avatar {
      width: 44px; height: 44px; border-radius: 50%;
      object-fit: cover; flex-shrink: 0;
      border: 2px solid var(--border);
      background: var(--bg);
    }
    .person-info { flex: 1; min-width: 0; }
    .person-ldap {
      font-size: 15px; font-weight: 600; color: var(--ink);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .person-role {
      font-size: 12px; color: var(--faint); margin-top: 2px;
      font-family: 'DM Mono', monospace;
    }

    /* Shift badge */
    .shift-badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 14px; border-radius: 99px;
      font-size: 13px; font-weight: 600;
      min-width: 96px; justify-content: center;
      flex-shrink: 0;
    }
    .shift-on {
      background: var(--green-lt);
      color: var(--green);
      border: 1px solid rgba(26,127,55,.2);
    }
    .shift-off {
      background: var(--bg);
      color: var(--faint);
      border: 1px solid var(--border);
    }
    .shift-vl {
      background: var(--yellow-lt);
      color: var(--yellow);
      border: 1px solid rgba(154,103,0,.2);
    }
    .shift-unk {
      background: var(--bg);
      color: var(--faint);
      border: 1px solid var(--border);
    }
    .shift-dot {
      width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
    }
    .shift-on  .shift-dot { background: var(--green); animation: pulse 2s ease-in-out infinite; }
    .shift-off .shift-dot { background: var(--faint); }
    .shift-vl  .shift-dot { background: var(--yellow); }

    /* Role tag */
    .role-tag {
      font-family: 'DM Mono', monospace;
      font-size: 11px; font-weight: 500;
      padding: 3px 10px; border-radius: 99px;
      flex-shrink: 0;
    }
    .role-sup {
      background: var(--purple-lt); color: var(--purple);
      border: 1px solid rgba(130,80,223,.2);
    }
    .role-sme {
      background: var(--blue-lt); color: var(--blue);
      border: 1px solid rgba(9,105,218,.2);
    }

    /* ─────────────────────────────────────────
       EMPTY / LOADING
    ───────────────────────────────────────── */
    .loading-state {
      padding: 64px 32px;
      text-align: center;
      color: var(--faint);
      font-size: 14px;
    }
    .skeleton-row {
      display: flex; align-items: center; gap: 16px;
      padding: 14px 24px; border-bottom: 1px solid var(--border);
    }
    .skel {
      border-radius: 99px;
      background: linear-gradient(90deg, var(--bg) 25%, #EAEEF2 50%, var(--bg) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    /* ─────────────────────────────────────────
       LEGEND
    ───────────────────────────────────────── */
    .legend {
      display: flex; gap: 20px; align-items: center;
      margin-bottom: 16px; flex-wrap: wrap;
      animation: fadeUp .4s .05s ease both;
    }
    .legend-item {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--muted); font-weight: 500;
    }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

    /* ─────────────────────────────────────────
       FOOTER
    ───────────────────────────────────────── */
    .page-footer {
      text-align: center; padding: 24px;
      font-size: 12px; color: var(--faint);
      font-family: 'DM Mono', monospace;
    }

    /* ─────────────────────────────────────────
       RESPONSIVE
    ───────────────────────────────────────── */
    @media (max-width: 640px) {
      .page-body { padding: 16px 16px 60px; }
      .hero { flex-direction: column; align-items: flex-start; }
      .hero-stats { width: 100%; }
      .hero-stat { flex: 1; }
      .day-tabs { width: 100%; }
      .day-tab { flex: 1; justify-content: center; }
      .page-header { padding: 0 16px; }
      .ph-title { display: none; }
    }
  </style>
</head>
<body>

<!-- ════════════════════════════════════
     PAGE HEADER
════════════════════════════════════ -->
<header class="page-header">
  <div class="ph-left">
    <a class="ph-logo" href="#" id="logoLink">
      <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2f/Google_Play_2022_icon.svg/960px-Google_Play_2022_icon.svg.png" alt="Google Play">
      <span class="ph-logo-name">Escalations</span>
    </a>
    <div class="ph-divider"></div>
    <span class="ph-title">Team Schedule</span>
  </div>
  <div class="ph-right">
    <div class="live-dot"></div>
    <span class="live-label" id="liveLabel">Loading…</span>
    <a href="#" class="btn-sm" id="backBtn">
      <span class="material-symbols-outlined">arrow_back</span>
      Back to Dashboard
    </a>
  </div>
</header>

<!-- ════════════════════════════════════
     PAGE BODY
════════════════════════════════════ -->
<main class="page-body">

  <!-- HERO -->
  <div class="hero" id="heroStrip">
    <div class="hero-left">
      <div class="hero-date" id="heroDate">—</div>
      <div class="hero-heading">Team Availability</div>
      <div class="hero-sub">Google Play Ops · gUP Escalations · PHT</div>
    </div>
    <div class="hero-stats" id="heroStats">
      <!-- populated by JS -->
      <div class="hero-stat"><div class="hero-stat-val" style="font-size:18px;color:var(--faint)">…</div><div class="hero-stat-lbl">Loading</div></div>
    </div>
  </div>

  <!-- LEGEND -->
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div>On Shift</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--faint)"></div>Day Off</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--yellow)"></div>Vacation Leave</div>
    <div class="legend-item" style="margin-left:auto">
      <div class="legend-dot" style="background:var(--purple)"></div>Supervisor
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:var(--blue)"></div>SME
    </div>
  </div>

  <!-- DAY TABS -->
  <div class="day-tabs" id="dayTabs">
    <!-- populated by JS -->
  </div>

  <!-- SCHEDULE TABLE -->
  <div class="schedule-wrap" id="scheduleWrap">
    <div class="loading-state">
      <div class="skeleton-row"><div class="skel" style="width:44px;height:44px;border-radius:50%"></div><div style="flex:1"><div class="skel" style="width:40%;height:14px;margin-bottom:8px"></div><div class="skel" style="width:25%;height:12px"></div></div><div class="skel" style="width:96px;height:32px;border-radius:99px"></div></div>
      <div class="skeleton-row"><div class="skel" style="width:44px;height:44px;border-radius:50%"></div><div style="flex:1"><div class="skel" style="width:35%;height:14px;margin-bottom:8px"></div><div class="skel" style="width:20%;height:12px"></div></div><div class="skel" style="width:96px;height:32px;border-radius:99px"></div></div>
      <div class="skeleton-row"><div class="skel" style="width:44px;height:44px;border-radius:50%"></div><div style="flex:1"><div class="skel" style="width:50%;height:14px;margin-bottom:8px"></div><div class="skel" style="width:30%;height:12px"></div></div><div class="skel" style="width:96px;height:32px;border-radius:99px"></div></div>
    </div>
  </div>

</main>

<div class="page-footer" id="pageFooter">Google Play Escalations · Schedule Viewer</div>

<!-- ════════════════════════════════════
     SCRIPT
════════════════════════════════════ -->
<script>
  var rawSchedule  = [];
var activeDayIdx = 0;

function trimSeconds(t) {
  return String(t||'').replace(/^(\d+:\d+):\d+(\s*[AP]M)$/i,'$1$2');
}

  /* ── INIT ── */
window.onload = function() {
  updateHeroDate();

  // --- NEW: FETCH ROUTING URL ---
  google.script.run.withSuccessHandler(function(url) {
    document.getElementById('logoLink').href = url + '?page=dashboard';
    document.getElementById('backBtn').href  = url + '?page=dashboard';
  }).getWebAppUrl();
  // ------------------------------

  try {
    google.script.run
      .withSuccessHandler(function(data) {
          rawSchedule = data || [];
          if (!rawSchedule.length) {
            document.getElementById('scheduleWrap').innerHTML =
              '<div class="loading-state">No schedule data found. Make sure the SupervisorList tab has date columns from column D onwards.</div>';
            return;
          }
          buildDayTabs();
          renderHeroStats(0);
          renderSchedule(0);
          updateLiveLabel();
        })
        .withFailureHandler(function(err) {
          document.getElementById('scheduleWrap').innerHTML =
            '<div class="loading-state">Failed to load schedule: ' + (err.message || err) + '</div>';
        })
        .getSchedule();
    } catch(e) {
      document.getElementById('scheduleWrap').innerHTML =
        '<div class="loading-state">Running outside of Google Apps Script — schedule data unavailable in preview.</div>';
    }
  };

  /* ── HERO DATE ── */
  function updateHeroDate() {
    var d = new Date();
    var opts = { weekday:'long', year:'numeric', month:'long', day:'numeric', timeZone:'Asia/Manila' };
    document.getElementById('heroDate').textContent = d.toLocaleDateString('en-US', opts).toUpperCase();
  }

  /* ── LIVE LABEL ── */
  function updateLiveLabel() {
    var t = new Date().toLocaleTimeString('en-US', {
      hour:'numeric', minute:'2-digit', hour12:true, timeZone:'Asia/Manila'
    });
    document.getElementById('liveLabel').textContent = 'Updated ' + t + ' PHT';
    document.getElementById('pageFooter').textContent =
      'Google Play Escalations · Schedule Viewer · Last refreshed ' + t + ' PHT';
  }

  /* ── BUILD DAY TABS ── */
  function buildDayTabs() {
    if (!rawSchedule.length || !rawSchedule[0].days) return;
    var days  = rawSchedule[0].days;
    var tabs  = document.getElementById('dayTabs');
    tabs.innerHTML = '';

    days.forEach(function(day, idx) {
      var onCount = rawSchedule.filter(function(p){
        return p.days[idx] && p.days[idx].status === 'on';
      }).length;

      var btn = document.createElement('div');
      btn.className = 'day-tab' + (idx === 0 ? ' active' : '');
      btn.innerHTML =
        '<span>' + day.label + '</span>' +
        '<span class="day-tab-date">' + day.dateLabel + '</span>' +
        '<span class="day-tab-count">' + onCount + '</span>';
      btn.addEventListener('click', function() { selectDay(idx); });
      tabs.appendChild(btn);
    });
  }

  /* ── SELECT DAY ── */
  function selectDay(idx) {
    activeDayIdx = idx;
    document.querySelectorAll('.day-tab').forEach(function(t, i) {
      t.classList.toggle('active', i === idx);
    });
    renderHeroStats(idx);
    renderSchedule(idx);
  }

  /* ── HERO STATS ── */
  function renderHeroStats(dayIdx) {
    var onCount  = rawSchedule.filter(function(p){ return p.days[dayIdx] && p.days[dayIdx].status === 'on';  }).length;
    var offCount = rawSchedule.filter(function(p){ return p.days[dayIdx] && p.days[dayIdx].status === 'off'; }).length;
    var vlCount  = rawSchedule.filter(function(p){ return p.days[dayIdx] && p.days[dayIdx].status === 'vl';  }).length;
    var total    = rawSchedule.length;

    document.getElementById('heroStats').innerHTML =
      stat(onCount,  'On Shift',  'c-green')  +
      stat(offCount, 'Off Today', '')          +
      stat(vlCount,  'On Leave',  vlCount > 0 ? 'c-yellow' : '') +
      stat(total,    'Total',     '');
  }

  function stat(val, lbl, cls) {
    return '<div class="hero-stat">' +
      '<div class="hero-stat-val ' + cls + '">' + val + '</div>' +
      '<div class="hero-stat-lbl">' + lbl + '</div>' +
    '</div>';
  }

  /* ── RENDER SCHEDULE ── */
  function renderSchedule(dayIdx) {
    var wrap = document.getElementById('scheduleWrap');
    if (!rawSchedule.length) return;

    var supervisors = rawSchedule.filter(function(p){ return String(p.role||'').toLowerCase().includes('supervisor'); });
    var smes        = rawSchedule.filter(function(p){ return !String(p.role||'').toLowerCase().includes('supervisor'); });

    // Sort: on-shift first, then off, then vl/unknown
    function sortByStatus(arr) {
      return arr.slice().sort(function(a, b) {
        var order = { on: 0, off: 1, vl: 2, unknown: 3 };
        var sa = (a.days[dayIdx] || {}).status || 'unknown';
        var sb = (b.days[dayIdx] || {}).status || 'unknown';
        return (order[sa] || 0) - (order[sb] || 0);
      });
    }

    var html = '';

    if (supervisors.length) {
      var onSup = supervisors.filter(function(p){ return (p.days[dayIdx]||{}).status === 'on'; }).length;
      html += sectionHeader('Supervisors', supervisors.length, onSup);
      sortByStatus(supervisors).forEach(function(p, i) {
        html += buildPersonRow(p, dayIdx, i, 'sup');
      });
    }

    if (smes.length) {
      var onSme = smes.filter(function(p){ return (p.days[dayIdx]||{}).status === 'on'; }).length;
      html += sectionHeader('SMEs', smes.length, onSme);
      sortByStatus(smes).forEach(function(p, i) {
        html += buildPersonRow(p, dayIdx, i, 'sme');
      });
    }

    wrap.innerHTML = html || '<div class="loading-state">No people found in the schedule.</div>';
  }

  function sectionHeader(label, total, onCount) {
    return '<div class="section-header">' +
      '<span class="section-header-label">' + label + '</span>' +
      '<div class="section-header-line"></div>' +
      '<span class="section-header-count">' + onCount + ' / ' + total + ' on shift</span>' +
    '</div>';
  }

  function buildPersonRow(person, dayIdx, rowIndex, roleKey) {
    var day       = (person.days && person.days[dayIdx]) || {};
    var status    = day.status || 'unknown';
    var badgeCls  = status === 'on' ? 'shift-on' : status === 'vl' ? 'shift-vl' : (status === 'off' || status === 'scheduled') ? 'shift-off' : 'shift-unk';
    var badgeTxt  = (status === 'on' || status === 'scheduled') ? trimSeconds(day.value) : status === 'vl' ? 'On Leave' : status === 'off' ? 'Day Off' : '—';
    var showDot = status === 'on' || status === 'off' || status === 'vl' || status === 'scheduled';
    var roleTagCls= roleKey === 'sup' ? 'role-sup' : 'role-sme';
    var roleLabel = roleKey === 'sup' ? 'Supervisor' : 'SME';

    var delay     = (rowIndex * 40) + 'ms';
    var p         = 'https://moma-teams-photos.corp.google.com/photos/' + person.ldap + '?sz=88';
    var f         = p + '&type=SECURITY&type=SILHOUETTE';

    return '<div class="person-row" style="animation-delay:' + delay + '">' +
      '<img src="' + p + '" class="person-avatar" onerror="this.onerror=null;this.src=\'' + f + '\'">' +
      '<div class="person-info">' +
        '<div class="person-ldap">' + person.ldap + '</div>' +
        '<div class="person-role">' + (person.email || person.ldap + '@google.com') + '</div>' +
      '</div>' +
      '<span class="role-tag ' + roleTagCls + '">' + roleLabel + '</span>' +
      '<div class="shift-badge ' + badgeCls + '">' +
        (showDot ? '<span class="shift-dot"></span>' : '') +
        badgeTxt +
      '</div>' +
    '</div>';
  }
</script>
</body>
</html>
